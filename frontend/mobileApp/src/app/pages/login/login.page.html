<ion-header>
  <ion-toolbar class="app-toolbar">
    <ion-title>Welcome</ion-title>
    <ion-button slot="end" fill="clear" size="small" type="button" (click)="manageServer()">
      Server
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="app-page auth-page">
  <div class="auth-frame">
    <div class="auth-orb auth-orb--gold" aria-hidden="true"></div>
    <div class="auth-orb auth-orb--blue" aria-hidden="true"></div>

    <div class="page-shell auth-shell">
      <section class="panel auth-panel">
        <div class="auth-panel__head auth-panel__head--centered">
          <div class="auth-mark">
            <img src="assets/branding/bee-logo.png" alt="Expense Manager logo" />
          </div>
          <p class="eyebrow">Expense Manager</p>
          <h2>Sign in</h2>
          <p class="page-copy">Use your email and password, or continue with Google.</p>
        </div>

        <form #authForm="ngForm" class="field-stack" (ngSubmit)="submitAuth(authForm.valid)">
          <ion-input
            class="app-input auth-input"
            fill="outline"
            label="Email"
            labelPlacement="floating"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            required
            [(ngModel)]="authData.email"
          ></ion-input>

          <ion-input
            class="app-input auth-input"
            fill="outline"
            label="Password"
            labelPlacement="floating"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            minlength="6"
            [(ngModel)]="authData.password"
          ></ion-input>

          <ion-button class="primary-action auth-submit" expand="block" type="submit" [disabled]="isSubmitting">
            <ion-icon slot="start" name="log-in-outline"></ion-icon>
            Sign in
          </ion-button>
        </form>

        <div class="auth-divider">
          <span></span>
          <small>or continue with</small>
          <span></span>
        </div>

        <ion-button class="google-action auth-google" expand="block" type="button" (click)="startGoogleSignIn()">
          <ion-icon slot="start" name="logo-google"></ion-icon>
          Continue with Google
        </ion-button>
      </section>
    </div>
  </div>
</ion-content>
